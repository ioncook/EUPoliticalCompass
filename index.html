<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>EU Political Compass</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇪🇺</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #e0e0e0;
      line-height: 1.6;
      padding: 20px;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #121212;
      color: #ffffff;
      padding: 25px;
      border-radius: 15px;
      border: 1px solid #333;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      height: 32px;
      width: auto;
    }

    .controls {
      display: flex;
      gap: 20px;
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #333;
      margin-bottom: 20px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
    }

    .control-group label {
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 11px;
      font-weight: 600;
    }

    select,
    input,
    button {
      font-family: inherit;
      background-color: #252525;
      color: #ffffff;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .chart-area {
      position: relative;
      height: 65vh;
      min-height: 480px;
      background-color: #0a0a0a;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
    }

    #groupLegend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 10px;
      border: 1px solid #333;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid transparent;
    }

    .legend-item:hover {
      background: #252525;
      border-color: #444;
    }

    .legend-item.active {
      background: #333;
      border-color: #007bff;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    h2 {
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    #status {
      font-size: 12px;
      color: #666 !important;
    }

    #credits {
      font-size: 12px;
      color: #666;
      padding: 5px;
    }

    a {
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-group">
        <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h2>EU Political Compass</h2>
      </div>
      <span id="status">Waiting for CSV upload...</span>
    </div>

    <div class="controls">
      <div class="control-group" id="uploadSection">
        <label>Upload CSV</label>
        <input type="file" id="csvFileInput" accept=".csv" />
      </div>
      <div class="control-group">
        <label>Election</label>
        <select id="yearSelect" disabled></select>
      </div>
      <div class="control-group">
        <label>Country</label>
        <select id="countrySelect" disabled></select>
      </div>
      <div class="control-group">
        <label>Compare</label>
        <select id="compareYearSelect" disabled></select>
      </div>
      <div class="control-group">
        <label>Labels</label>
        <select id="labelModeSelect">
          <option value="none">None</option>
          <option value="name">Name</option>
          <option value="flag">Flag</option>
        </select>
      </div>
    </div>

    <div class="chart-area">
      <canvas id="compassChart"></canvas>
    </div>

    <div id="groupLegend"></div>
    <div id="credits">Created with the help of <a href="https://gemini.google.com/app">Google Gemini</a> by <a
        href="https://github.com/ioncook">Ion Cook</a> using <a href="https://www.chesdata.eu/">CHES</a> data, 2026. <a
        href=https://github.com/ioncook/EUPoliticalCompass>View source</a></div>
  </div>

  <script>
    const countryMapping = { 1: "BE", 2: "DK", 3: "DE", 4: "GR", 5: "ES", 6: "FR", 7: "IE", 8: "IT", 10: "NL", 11: "GB", 12: "PT", 13: "AT", 14: "FI", 16: "SE", 20: "BG", 21: "CZ", 22: "EE", 23: "HU", 24: "LV", 25: "LT", 26: "PL", 27: "RO", 28: "SK", 29: "SI", 31: "HR", 37: "MT", 38: "LU", 40: "CY" };

    function getFlagEmoji(countryCode) {
      const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
      return String.fromCodePoint(...codePoints);
    }

    const groupMapping = {
      1: { name: "Patriots/ESN (Sovreigntist)", color: "#c09f62" },
      2: { name: "EPP/ECR (Conservative)", color: "#2222dd" },
      3: { name: "Renew (Liberal)", color: "#FFD700" },
      4: { name: "EPP (Christian Democrat)", color: "#3399ff" },
      5: { name: "S&D (Social Democrat)", color: "#f0001c" },
      6: { name: "The Left (Socialist/Communist)", color: "#792351" },
      7: { name: "Green/EFA", color: "#57b45f" },
      8: { name: "EFA / Regionalist", color: "#00AB84" },
      9: { name: "Non-Inscrit / Other", color: "#808080" },
      10: { name: "Explicit Christian", color: "#6347BF" },
      11: { name: "ECR (Agrarian)", color: "#0082D1" },
    };

    let allData = [];
    let myChart = null;
    let selectedPartyId = null;
    let selectedGroupIds = new Set();

    const evolutionPlugin = {
      id: 'evolutionPlugin',
      afterDatasetsDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        const labelMode = document.getElementById('labelModeSelect').value;
        const compVal = document.getElementById('compareYearSelect').value;
        const showChange = compVal !== "none" && parseInt(compVal) !== parseInt(document.getElementById("yearSelect").value);

        chart.data.datasets.forEach((dataset, i) => {
          if (dataset._isHistory) return;
          const meta = chart.getDatasetMeta(i);
          if (meta.hidden || !meta.data[0] || meta.data[0].options.radius === 0) return;

          const currentPoint = meta.data[0];
          const party = dataset._partyData;
          const history = dataset._history;

          if (showChange && history) {
            const oldX = x.getPixelForValue(history.x), oldY = y.getPixelForValue(history.y);
            const currX = currentPoint.x, currY = currentPoint.y;
            const radius = currentPoint.options.radius, oldRadius = Math.sqrt(history.vote || 2) * 4;

            const dist = Math.sqrt(Math.pow(currX - oldX, 2) + Math.pow(currY - oldY, 2));
            if (dist > (radius + oldRadius)) {
              const angle = Math.atan2(currY - oldY, currX - oldX);
              ctx.beginPath();
              ctx.strokeStyle = dataset.borderColor;
              ctx.lineWidth = 1.5;
              ctx.moveTo(oldX + Math.cos(angle) * oldRadius, oldY + Math.sin(angle) * oldRadius);
              ctx.lineTo(currX - Math.cos(angle) * (radius + 1), currY - Math.sin(angle) * (radius + 1));
              ctx.stroke();
            }
          }

          if (labelMode !== 'none') {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (labelMode === 'name') {
              ctx.fillStyle = '#bbbbbb';
              ctx.font = `bold ${Math.max(9, currentPoint.options.radius * 0.8)}px sans-serif`;
              ctx.fillText(party.party, currentPoint.x, currentPoint.y + 1);
            } else if (labelMode === 'flag') {
              const countryCode = countryMapping[party.country] || "";
              if (countryCode) {
                ctx.globalAlpha = 0.6;
                ctx.font = `${currentPoint.options.radius * 1.5}px sans-serif`;
                ctx.fillText(getFlagEmoji(countryCode), currentPoint.x, currentPoint.y + (currentPoint.options.radius * 0.1));
                ctx.globalAlpha = 1.0;
              }
            }
          }
        });
      }
    };

    window.onload = async () => {
      try {
        const response = await fetch("1999-2024_CHES_dataset_meansV2.csv");
        const csvText = await response.text();
        Papa.parse(csvText, {
          header: true, dynamicTyping: true, skipEmptyLines: true,
          complete: function (results) {
            if (document.getElementById("uploadSection")) document.getElementById("uploadSection").remove();
            allData = results.data;
            document.getElementById("status").innerText = "Auto-Loaded";
            setupDropdowns();
            renderChart();
          },
        });
      } catch (err) { console.log("Waiting for upload..."); }
    };

    document.getElementById("csvFileInput").addEventListener("change", function (e) {
      Papa.parse(e.target.files[0], {
        header: true, dynamicTyping: true, skipEmptyLines: true,
        complete: function (results) {
          allData = results.data;
          document.getElementById("status").innerText = "Data Loaded";
          setupDropdowns();
          renderChart();
        },
      });
    });

    function setupDropdowns() {
      const years = [...new Set(allData.map((d) => d.year))].sort((a, b) => b - a);
      const codesInData = [...new Set(allData.map((d) => d.country))].filter(Boolean);
      let countryOptions = codesInData.map(code => ({ code: countryMapping[code], id: code })).filter(c => c.code !== undefined).sort((a, b) => a.code.localeCompare(b.code));

      const ySel = document.getElementById("yearSelect"), cySel = document.getElementById("compareYearSelect"), cSel = document.getElementById("countrySelect"), lSel = document.getElementById("labelModeSelect");

      ySel.innerHTML = years.map((y) => `<option value="${y}">${y}</option>`).join("");
      cySel.innerHTML = `<option value="none">None</option>` + years.map((y) => `<option value="${y}">${y}</option>`).join("");
      cSel.innerHTML = `<option value="ALL">🌍 All Countries</option>` + countryOptions.map((c) => `<option value="${c.code}">${getFlagEmoji(c.code)} ${c.code}</option>`).join("");

      [ySel, cySel, cSel, lSel].forEach(s => { s.disabled = false; s.onchange = renderChart; });

      enableWheelSelection("yearSelect");
      enableWheelSelection("countrySelect");
      enableWheelSelection("compareYearSelect");
      enableWheelSelection("labelModeSelect");

      renderGroupLegend();
    }

    function renderGroupLegend() {
      const legendContainer = document.getElementById("groupLegend");
      legendContainer.innerHTML = "";
      Object.keys(groupMapping).forEach(id => {
        const group = groupMapping[id];
        const item = document.createElement("div");
        item.className = `legend-item ${selectedGroupIds.has(parseInt(id)) ? 'active' : ''}`;
        item.innerHTML = `<div class="dot" style="background:${group.color}"></div><span>${group.name}</span>`;
        item.onclick = () => {
          const numId = parseInt(id);
          if (selectedGroupIds.has(numId)) selectedGroupIds.delete(numId);
          else selectedGroupIds.add(numId);
          selectedPartyId = null;
          renderChart();
          renderGroupLegend();
        };
        legendContainer.appendChild(item);
      });
    }

    function renderChart() {
      const selectedYear = parseInt(document.getElementById("yearSelect").value);
      const compVal = document.getElementById("compareYearSelect").value;
      const compareYear = compVal === "none" ? null : parseInt(compVal);
      const selectedCountry = document.getElementById("countrySelect").value;

      const showChange = compareYear !== null && compareYear !== selectedYear;

      const currentSet = allData.filter(d => d.year === selectedYear && (selectedCountry === "ALL" || countryMapping[d.country] === selectedCountry));
      const datasets = [];

      currentSet.forEach(d => {
        let isVisible = true;
        if (selectedPartyId !== null) {
          isVisible = (d.party_id === selectedPartyId);
        } else if (selectedGroupIds.size > 0) {
          isVisible = selectedGroupIds.has(d.family);
        }

        // FIX: Physically exclude invisible dots from the datasets so 'nearest' interaction ignores them
        if (!isVisible) return;

        const baseRadius = Math.sqrt(d.vote || 2) * 4;
        const history = showChange ? allData.find(h => h.party_id === d.party_id && h.year === compareYear) : null;
        const historyRadius = history ? Math.sqrt(history.vote || 2) * 4 : 0;

        const interactionRadius = 5;

        if (showChange && history) {
          datasets.push({
            label: `${d.party} (${compareYear})`,
            backgroundColor: 'transparent', borderColor: groupMapping[d.family]?.color || "#888",
            borderWidth: 1.5, data: [{ x: history.lrecon, y: history.galtan, r: historyRadius }],
            _partyData: history, _isHistory: true, order: 2,
            hitRadius: interactionRadius, hoverRadius: interactionRadius
          });
        }

        datasets.push({
          label: d.party,
          backgroundColor: (groupMapping[d.family]?.color || "#808080") + "AA",
          borderColor: groupMapping[d.family]?.color || "#888",
          data: [{ x: d.lrecon, y: d.galtan, r: baseRadius }],
          _partyData: d, _history: history ? { x: history.lrecon, y: history.galtan, vote: history.vote } : null,
          order: 1,
          hitRadius: interactionRadius, hoverRadius: interactionRadius
        });
      });

      if (myChart) myChart.destroy();
      myChart = new Chart(document.getElementById("compassChart").getContext("2d"), {
        type: "bubble",
        data: { datasets },
        plugins: [evolutionPlugin],
        options: {
          interaction: {
            mode: 'nearest',
            intersect: false,
            axis: 'xy'
          },
          animation: false, maintainAspectRatio: false, layout: { padding: 30 },
          onHover: (e, el) => {
            const visible = el.length > 0;
            e.native.target.style.cursor = visible ? "pointer" : "default";
          },
          onClick: (event, elements, chart) => {
            const isTouch = (('ontouchstart' in window) || (navigator.maxTouchPoints > 0));
            if (isTouch) return;

            if (elements.length === 0) {
              selectedPartyId = null;
            } else {
              const ds = chart.data.datasets[elements[0].datasetIndex];
              if (!ds._isHistory) {
                selectedPartyId = (selectedPartyId === ds._partyData.party_id) ? null : ds._partyData.party_id;
              }
            }
            renderChart();
            renderGroupLegend();
          },
          scales: {
            x: { min: 0, max: 10, title: { display: true, text: "Economy: Left — Right", color: "#fff" }, grid: { color: (c) => (c.tick.value === 5 ? "#999" : "#333") } },
            y: { min: 0, max: 10, title: { display: true, text: "Social: Progressive — Conservative", color: "#fff" }, grid: { color: (c) => (c.tick.value === 5 ? "#999" : "#333") } },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              enabled: true,
              callbacks: {
                label: (ctx) => {
                  const d = ctx.dataset._partyData;
                  const countryCode = countryMapping[d.country] || "";
                  const flag = countryCode ? getFlagEmoji(countryCode) : "";
                  const groupName = groupMapping[d.family]?.name || "Unknown Group";
                  return [
                    `${flag} ${d.party} (${d.year})`,
                    `Group: ${groupName}`,
                    `Vote: ${d.vote}%`,
                    `Econ: ${Math.round(d.lrecon * 10) / 10}, Social: ${Math.round(d.galtan * 10) / 10}`
                  ];
                }
              }
            }
          }
        }
      });
    }

    let scrollAccumulator = 0;
    function enableWheelSelection(selectId) {
      const el = document.getElementById(selectId);
      const THRESHOLD = 100;

      el.addEventListener("wheel", function (e) {
        const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
        if (isTouch) return;

        e.preventDefault();
        scrollAccumulator += e.deltaY;

        if (Math.abs(scrollAccumulator) >= THRESHOLD) {
          if (scrollAccumulator > 0) {
            if (this.selectedIndex < this.options.length - 1) {
              this.selectedIndex++;
              this.dispatchEvent(new Event("change"));
            }
          } else {
            if (this.selectedIndex > 0) {
              this.selectedIndex--;
              this.dispatchEvent(new Event("change"));
            }
          }
          scrollAccumulator = 0;
        }
      },
        { passive: false },
      );
    }
  </script>
</body>

</html>
