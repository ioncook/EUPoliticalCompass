<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>EU Political Compass</title>
  <link rel="icon" href="favicon.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-0: #000000;
      --bg-1: #121212;
      --bg-2: #1e1e1e;
      --bg-3: #1a1a1a;
      --bg-4: #0a0a0a;
      --bg-select: #252525;
      --bg-hover: #333333;
      --text-main: #ffffff;
      --text-body: #e0e0e0;
      --text-dim: #bbbbbb;
      --text-muted: #666666;
      --text-legend: #888888;
      --border-main: #333333;
      --border-dim: #222222;
      --border-select: #444444;
      --border-active: #888888;
      --flag-opacity: 0.6;
    }

    body.light-theme {
      --bg-0: #f0f2f5;
      --bg-1: #ffffff;
      --bg-2: #f8f9fa;
      --bg-3: #ffffff;
      --bg-4: #ffffff;
      --bg-select: #e9ecef;
      --bg-hover: #f1f3f5;
      --text-main: #1a1d23;
      --text-body: #333c48;
      --text-dim: #374151;
      --text-muted: #000000;
      --text-legend: #000000;
      --border-main: #d1d5db;
      --border-dim: #f1f3f5;
      --border-select: #d1d5db;
      --border-active: #444444;
      --flag-opacity: 0.85;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-0);
      color: var(--text-body);
      line-height: 1.6;
      padding: 0;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
      height: 100vh;
      height: 100dvh;
      display: flex;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .container {
      width: 100%;
      height: 100%;
      background: var(--bg-1);
      color: var(--text-main);
      padding: 10px 15px;
      border-radius: 0;
      border: none;
      box-shadow: none;
      display: flex;
      flex-direction: column;
    }

    .header,
    .controls,
    #source {
      flex-shrink: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      line-height: 1;
      gap: 2px;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      height: 32px;
      width: auto;
    }

    .controls {
      display: flex;
      gap: 15px;
      background: var(--bg-2);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid var(--border-main);
      margin-bottom: 10px;
      align-items: flex-end;
      flex-wrap: nowrap;
      /* Prevent wrapping which causes height jumps */
      min-height: 92px;
      /* Lock height */
      overflow-x: visible;
      /* Allow dropdowns to break out of the container */
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      justify-content: flex-end;
      position: relative;
      /* Added for dropdown positioning */
    }

    .control-group label {
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 11px;
      font-weight: 600;
    }

    select,
    input,
    button {
      font-family: inherit;
      background-color: var(--bg-select);
      color: var(--text-main);
      border: 1px solid var(--border-select);
      padding: 0 10px;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
      cursor: pointer;
      box-sizing: border-box;
      height: 40px;
      margin: 0;
      line-height: 40px;
      overflow: hidden;
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    select::-webkit-scrollbar {
      display: none;
    }

    #yearSelect {
      width: 80px;
    }

    #countrySelect {
      width: 160px;
    }

    #compareYearSelect {
      width: 100px;
    }

    #labelModeSelect {
      width: 100px;
    }

    #bestFitSelect {
      width: 80px;
    }

    #resetBtn {
      background-color: var(--bg-select);
      border: 1px solid var(--border-select);
      color: var(--text-main);
      padding: 0 15px;
      font-size: 14px;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      height: 40px;
      margin: 0;
    }

    #resetBtn:hover {
      background-color: var(--bg-hover);
      border-color: var(--text-muted);
      color: var(--text-main);
    }

    .chart-area {
      position: relative;
      flex-grow: 1;
      background-color: var(--bg-4);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      overflow: hidden;
    }

    .custom-select {
      background-color: var(--bg-select);
      color: var(--text-main);
      border: 1px solid var(--border-select);
      padding: 0 10px;
      border-radius: 6px;
      font-size: 14px;
      height: 40px;
      cursor: pointer;
      width: 140px;
      display: flex;
      justify-content: flex-start;
      padding-left: 10px;
      padding-right: 25px;
      /* space for arrow */
      align-items: center;
      position: relative;
    }

    #compareDropdown {
      width: 120px;
    }

    #groupDropdown {
      width: 180px;
    }

    #countryDropdown {
      width: 135px;
    }

    .custom-select span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 10px;
    }

    .custom-select::after {
      content: '▼';
      font-size: 10px;
      color: #888;
      flex-shrink: 0;
      position: absolute;
      right: 10px;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--bg-3);
      border: 1px solid var(--border-select);
      border-radius: 6px;
      z-index: 100;
      width: max-content;
      min-width: 100%;
      max-width: 320px;
      margin-top: 5px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      padding: 5px;
      max-height: 400px;
      overflow-y: auto;
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    .dropdown-menu::-webkit-scrollbar {
      display: none;
      /* Hide scrollbar for Chrome, Safari and Opera */
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      margin: 0;
      border-radius: 5px;
      transition: background 0.2s;
      border: 1px solid transparent;
      white-space: normal;
      /* Allow wrapping for long names */
      line-height: 1.3;
      color: var(--text-main);
    }

    .dropdown-item .dot {
      flex-shrink: 0;
      /* Don't squash the color dot */
    }

    .dropdown-item:hover {
      background: var(--bg-hover);
      border-color: var(--border-select);
    }

    .dropdown-item.active {
      background: var(--bg-hover);
      border-color: var(--border-active);
    }

    /* Merged highlight for sequential active items */
    .dropdown-item.active:has(+ .dropdown-item.active) {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom: none;
      padding-bottom: 9px;
    }

    .dropdown-item.active+.dropdown-item.active {
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      border-top: none;
      padding-top: 9px;
    }

    .dropdown-item.clear-all {
      background: var(--bg-select);
      border-bottom: 1px solid var(--border-main);
      margin-bottom: 4px;
      justify-content: center;
      transition: all 0.15s ease;
      opacity: 0.8;
    }

    .dropdown-item.clear-all:hover {
      background: var(--bg-hover);
      opacity: 1;
      border-color: var(--border-active);
    }

    .dropdown-item.clear-all span {
      color: var(--text-dim);
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dropdown-item.clear-all:hover span {
      color: var(--text-main);
    }

    #compareMenu .dropdown-item {
      justify-content: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    h2 {
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
    }

    #status {
      font-size: 12px;
      color: var(--text-muted) !important;
    }

    #source {
      font-size: 12px;
      color: var(--text-muted);
    }

    a {
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-group">
        <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h2>EU Political Compass</h2>
      </div>
      <div class="header-right">
        <span id="status">Waiting for CSV upload...</span>
        <div id="source"> <a href=https://github.com/ioncook/EUPoliticalCompass>View source</a></div>
      </div>
    </div>

    <div class="controls">
      <div class="control-group" id="uploadSection">
        <label>Upload CSV</label>
        <input type="file" id="csvFileInput" accept=".csv" />
      </div>
      <div class="control-group">
        <label>Election</label>
        <select id="yearSelect" disabled></select>
      </div>
      <div class="control-group">
        <label>Countries</label>
        <div class="custom-select" id="countryDropdown" onclick="toggleCountryMenu()">
          <span id="countryDropdownText">All Countries</span>
        </div>
        <div id="countryMenu" class="dropdown-menu" style="display: none;"></div>
      </div>
      <div class="control-group">
        <label>Compare</label>
        <div class="custom-select" id="compareDropdown" onclick="toggleCompareMenu()">
          <span id="compareDropdownText">None</span>
        </div>
        <div id="compareMenu" class="dropdown-menu" style="display: none;"></div>
      </div>
      <div class="control-group">
        <label>Groups</label>
        <div class="custom-select" id="groupDropdown" onclick="toggleGroupMenu()">
          <span id="groupDropdownText">All Groups</span>
        </div>
        <div id="groupMenu" class="dropdown-menu" style="display: none;"></div>
      </div>
      <div class="control-group">
        <label>Labels</label>
        <select id="labelModeSelect">
          <option value="none">None</option>
          <option value="name">Name</option>
          <option value="flag">Flag</option>
        </select>
      </div>
      <div class="control-group">
        <label>Best Fit</label>
        <select id="bestFitSelect">
          <option value="off">Off</option>
          <option value="on">On</option>
        </select>
      </div>
      <div class="control-group">
        <label>Theme</label>
        <select id="themeSelect">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="control-group">
        <label>&nbsp;</label>
        <button id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="chart-area">
      <canvas id="compassChart"></canvas>
    </div>

  </div>

  <script>
    const countryMapping = { 1: "BE", 2: "DK", 3: "DE", 4: "GR", 5: "ES", 6: "FR", 7: "IE", 8: "IT", 10: "NL", 11: "GB", 12: "PT", 13: "AT", 14: "FI", 16: "SE", 20: "BG", 21: "CZ", 22: "EE", 23: "HU", 24: "LV", 25: "LT", 26: "PL", 27: "RO", 28: "SK", 29: "SI", 31: "HR", 37: "MT", 38: "LU", 40: "CY" };

    function getFlagEmoji(countryCode) {
      const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
      return String.fromCodePoint(...codePoints);
    }

    const groupMapping = {
      1: { name: "Patriots/ESN (Sovreigntist)", color: "#c09f62" },
      2: { name: "EPP/ECR (Conservative)", color: "#2222dd" },
      3: { name: "Renew (Liberal)", color: "#FFD700" },
      4: { name: "EPP (Christian Democrat)", color: "#3399ff" },
      5: { name: "S&D (Social Democrat)", color: "#f0001c" },
      6: { name: "The Left (Socialist/Communist)", color: "#792351" },
      7: { name: "Green/EFA", color: "#57b45f" },
      8: { name: "EFA / Regionalist", color: "#00AB84" },
      9: { name: "Non-Inscrit / Other", color: "#808080" },
      10: { name: "Explicit Christian", color: "#6347BF" },
      11: { name: "ECR (Agrarian)", color: "#0082D1" },
    };

    let allData = [];
    let myChart = null;
    let selectedPartyId = null;
    let selectedGroupIds = new Set();
    let selectedCompareYears = new Set();
    let selectedCountries = new Set();

    const evolutionPlugin = {
      id: 'evolutionPlugin',
      afterDatasetsDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        const labelMode = document.getElementById('labelModeSelect').value;

        chart.data.datasets.forEach((dataset, i) => {
          if (dataset._isHistory) return;
          const meta = chart.getDatasetMeta(i);
          if (meta.hidden || !meta.data[0]) return;
          const isPhantom = meta.data[0].options.radius === 0;
          if (isPhantom && (!dataset._historyList || dataset._historyList.length === 0)) return;

          const currentPoint = meta.data[0];
          const party = dataset._partyData;
          const history = dataset._history;

          const historyList = dataset._historyList || [];
          const points = [];

          // Add history points
          historyList.forEach(h => {
            points.push({
              x: x.getPixelForValue(h.x),
              y: y.getPixelForValue(h.y),
              radius: Math.sqrt(h.vote || 2) * 4,
              color: groupMapping[h.family]?.color || "#888"
            });
          });

          // Add current point
          points.push({
            x: currentPoint.x,
            y: currentPoint.y,
            radius: isPhantom ? (dataset._phantomRadius || 0) : currentPoint.options.radius,
            color: groupMapping[party.family]?.color || "#888"
          });

          // Draw sequential lines
          for (let k = 0; k < points.length - 1; k++) {
            const p1 = points[k];
            const p2 = points[k + 1];

            const dist = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            if (dist > (p1.radius + p2.radius)) {
              const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
              ctx.beginPath();

              if (p1.color !== p2.color) {
                const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                grad.addColorStop(0, p1.color);
                grad.addColorStop(1, p2.color);
                ctx.strokeStyle = grad;
              } else {
                ctx.strokeStyle = p1.color;
              }

              ctx.lineWidth = 1.5;
              ctx.moveTo(p1.x + Math.cos(angle) * p1.radius, p1.y + Math.sin(angle) * p1.radius);
              ctx.lineTo(p2.x - Math.cos(angle) * (p2.radius + 1), p2.y - Math.sin(angle) * (p2.radius + 1));
              ctx.stroke();
            }
          }

          const isHollow = dataset.backgroundColor === 'transparent';
          if (labelMode !== 'none' && !isPhantom && !isHollow) {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (labelMode === 'name') {
              ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-dim');
              ctx.font = `600 ${Math.max(9, currentPoint.options.radius * 0.8)}px system-ui`;
              ctx.fillText(party.party, currentPoint.x, currentPoint.y + 1);
            } else if (labelMode === 'flag') {
              const countryCode = countryMapping[party.country] || "";
              if (countryCode) {
                const style = getComputedStyle(document.body);
                ctx.globalAlpha = parseFloat(style.getPropertyValue('--flag-opacity'));
                ctx.font = `700 ${currentPoint.options.radius * 1.5}px system-ui`;
                ctx.fillText(getFlagEmoji(countryCode), currentPoint.x, currentPoint.y + (currentPoint.options.radius * 0.1));
                ctx.globalAlpha = 1.0;
              }
            }
          }
        });
      }
    };

    const centralAxisPlugin = {
      id: 'centralAxisPlugin',
      afterDatasetsDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
        const axisColor = getComputedStyle(document.body).getPropertyValue('--text-legend');
        ctx.save();
        ctx.strokeStyle = axisColor;
        ctx.lineWidth = 1;

        // Vertical axis at X=5
        const px5 = Math.floor(x.getPixelForValue(5)) + 0.5;
        ctx.beginPath();
        ctx.moveTo(px5, top - 2);
        ctx.lineTo(px5, bottom + 2);
        ctx.stroke();

        // Tick marks for X=5 at top and bottom frame
        ctx.beginPath();
        ctx.moveTo(px5, top);
        ctx.lineTo(px5, top - 8);
        ctx.moveTo(px5, bottom);
        ctx.lineTo(px5, bottom + 8);
        ctx.stroke();

        // Horizontal axis at Y=5
        const py5 = Math.floor(y.getPixelForValue(5)) + 0.5;
        ctx.beginPath();
        ctx.moveTo(left - 2, py5);
        ctx.lineTo(right + 2, py5);
        ctx.stroke();

        // Tick marks for Y=5 at left and right frame
        ctx.beginPath();
        ctx.moveTo(left, py5);
        ctx.lineTo(left - 8, py5);
        ctx.moveTo(right, py5);
        ctx.lineTo(right + 8, py5);
        ctx.stroke();

        ctx.restore();
      }
    };

    const regressionPlugin = {
      id: 'regressionPlugin',
      beforeDatasetsDraw(chart) {
        const bestFit = document.getElementById('bestFitSelect').value;
        if (bestFit === 'off') return;

        const { ctx, scales: { x, y } } = chart;

        const drawRegression = (datasets, isDashed) => {
          if (datasets.length < 2) return;

          let sumW = 0, sumWX = 0, sumWY = 0, sumWXX = 0, sumWXY = 0;
          datasets.forEach(ds => {
            const d = ds._partyData;
            if (d.lrecon === null || d.galtan === null) return;
            const px = d.lrecon;
            const py = d.galtan;
            const w = d.vote || 1;
            sumW += w;
            sumWX += w * px;
            sumWY += w * py;
            sumWXX += w * px * px;
            sumWXY += w * px * py;
          });

          const denominator = (sumW * sumWXX - sumWX * sumWX);
          if (sumW <= 0 || Math.abs(denominator) < 1e-10) return;

          const m = (sumW * sumWXY - sumWX * sumWY) / denominator;
          const b = (sumWY - m * sumWX) / sumW;

          const x1 = 0, y1 = m * x1 + b;
          const x2 = 10, y2 = m * x2 + b;

          ctx.save();
          ctx.beginPath();
          ctx.rect(chart.chartArea.left, chart.chartArea.top, chart.chartArea.width, chart.chartArea.height);
          ctx.clip();

          ctx.beginPath();
          const axisColor = getComputedStyle(document.body).getPropertyValue('--text-legend');
          ctx.strokeStyle = axisColor;
          if (isDashed) {
            ctx.setLineDash([6, 4]);
            ctx.globalAlpha = 0.4;
          } else {
            ctx.setLineDash([]);
            ctx.globalAlpha = 0.8;
          }
          ctx.lineWidth = 1;
          ctx.shadowBlur = 0;
          ctx.moveTo(x.getPixelForValue(x1), y.getPixelForValue(y1));
          ctx.lineTo(x.getPixelForValue(x2), y.getPixelForValue(y2));
          ctx.stroke();
          ctx.restore();
        };

        const primaryDatasets = chart.data.datasets.filter(ds => !ds._isHistory && ds._partyData && ds.backgroundColor !== 'transparent');
        const historyDatasets = chart.data.datasets.filter(ds => (ds._isHistory || ds.backgroundColor === 'transparent') && ds._partyData);

        // Draw history first (it will be behind the solid line if they overlap)
        drawRegression(historyDatasets, true);
        drawRegression(primaryDatasets, false);
      }
    };

    function updateURL() {
      const params = new URLSearchParams();
      params.set('year', document.getElementById("yearSelect").value);
      params.set('fit', document.getElementById("bestFitSelect").value);
      params.set('labels', document.getElementById("labelModeSelect").value);
      params.set('theme', document.getElementById("themeSelect").value);
      if (selectedCompareYears.size > 0) {
        params.set('compare', Array.from(selectedCompareYears).join(','));
      }
      if (selectedGroupIds.size > 0) {
        params.set('groups', Array.from(selectedGroupIds).join(','));
      }
      if (selectedCountries.size > 0) {
        params.set('countries', Array.from(selectedCountries).join(','));
      }
      const newUrl = window.location.pathname + '?' + params.toString();
      window.history.replaceState({ path: newUrl }, '', newUrl);
    }

    const cornerLabelsPlugin = {
      id: 'cornerLabelsPlugin',
      beforeDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom }, width, height } = chart;
        const style = getComputedStyle(document.body);
        ctx.save();
        ctx.fillStyle = style.getPropertyValue('--text-legend');
        ctx.textBaseline = 'middle';

        // Corner labels
        ctx.font = '300 12px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('LEFT', left, bottom + 40);

        ctx.textAlign = 'right';
        ctx.fillText('RIGHT', right, bottom + 40);

        ctx.save();
        ctx.translate(left - 45, top);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'right';
        ctx.fillText('CONSERVATIVE', 0, 0);
        ctx.restore();

        ctx.save();
        ctx.translate(left - 45, bottom);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'left';
        ctx.fillText('PROGRESSIVE', 0, 0);
        ctx.restore();

        // Large axis labels
        ctx.font = '700 24px sans-serif';
        ctx.fillStyle = style.getPropertyValue('--text-muted');

        // ECONOMY - bottom middle
        ctx.textAlign = 'center';
        ctx.fillText('ECONOMY', (left + right) / 2, bottom + 41);

        // SOCIAL - left middle
        ctx.save();
        ctx.translate(left - 46, (top + bottom) / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillText('SOCIAL', 0, 0);
        ctx.restore();

        ctx.restore();
      }
    };

    window.onload = async () => {

      try {
        const response = await fetch("1999-2024_CHES_dataset_meansV2.csv");
        const csvText = await response.text();

        Papa.parse(csvText, {
          header: true, dynamicTyping: true, skipEmptyLines: true,
          complete: function (results) {
            if (document.getElementById("uploadSection")) document.getElementById("uploadSection").remove();
            allData = results.data;
            document.getElementById("status").innerText = "Auto-Loaded";
            setupDropdowns();
            renderChart();
          },
        });
      } catch (err) { console.log("Waiting for upload..."); }
    };

    document.getElementById("csvFileInput").addEventListener("change", function (e) {
      Papa.parse(e.target.files[0], {
        header: true, dynamicTyping: true, skipEmptyLines: true,
        complete: function (results) {
          allData = results.data;
          document.getElementById("status").innerText = "Data Loaded";
          setupDropdowns();
          renderChart();
        },
      });
    });

    function setupDropdowns() {
      const years = [...new Set(allData.map((d) => d.year))].sort((a, b) => b - a);

      const ySel = document.getElementById("yearSelect"), lSel = document.getElementById("labelModeSelect"), fSel = document.getElementById("bestFitSelect"), tSel = document.getElementById("themeSelect");

      ySel.innerHTML = years.map((y) => `<option value="${y}">${y}</option>`).join("");

      // Apply URL params
      const params = new URLSearchParams(window.location.search);
      if (params.has('year')) ySel.value = params.get('year');
      if (params.has('labels')) lSel.value = params.get('labels');
      if (params.has('fit')) fSel.value = params.get('fit');
      if (params.has('theme')) {
        const theme = params.get('theme');
        tSel.value = theme;
        document.body.classList.toggle('light-theme', theme === 'light');
      }
      if (params.has('groups')) {
        selectedGroupIds = new Set(params.get('groups').split(',').map(Number).filter(n => !isNaN(n)));
      }
      if (params.has('compare')) {
        selectedCompareYears = new Set(params.get('compare').split(',').map(Number).filter(n => !isNaN(n)));
      }
      if (params.has('countries')) {
        selectedCountries = new Set(params.get('countries').split(',').filter(Boolean));
      }

      [lSel, fSel, tSel].forEach(s => { s.disabled = false; s.onchange = renderChart; });
      ySel.disabled = false;
      ySel.onchange = () => {
        renderCompareDropdown();
        renderChart();
      };

      document.getElementById("resetBtn").onclick = () => {
        window.location.href = window.location.pathname;
      };

      enableWheelSelection("yearSelect");
      enableWheelSelection("labelModeSelect");
      enableWheelSelection("bestFitSelect");
      enableWheelSelection("themeSelect");

      document.getElementById("themeSelect").onchange = (e) => {
        document.body.classList.toggle('light-theme', e.target.value === 'light');
        renderChart();
      };

      enableGroupWheelSelection();
      enableCompareWheelSelection();
      enableCountryWheelSelection();
      renderGroupDropdown();
      renderCompareDropdown();
      renderCountryDropdown();
    }

    function enableGroupWheelSelection() {
      const el = document.getElementById("groupDropdown");
      let scrollAccumulator = 0;
      const THRESHOLD = 60;

      el.addEventListener("wheel", function (e) {
        if (selectedGroupIds.size > 1) return; // Ignore if more than 1 group selected

        e.preventDefault();
        scrollAccumulator += e.deltaY;

        if (Math.abs(scrollAccumulator) >= THRESHOLD) {
          const direction = scrollAccumulator > 0 ? 1 : -1;
          const groupIds = Object.keys(groupMapping).map(Number);

          let currentIndex = -1;
          if (selectedGroupIds.size === 1) {
            const currentId = Array.from(selectedGroupIds)[0];
            currentIndex = groupIds.indexOf(currentId);
          }

          let nextIndex = currentIndex + direction;

          // Wrap logic: include -1 (All Groups) in the cycle
          if (nextIndex < -1) nextIndex = groupIds.length - 1;
          else if (nextIndex >= groupIds.length) nextIndex = -1;

          selectedGroupIds.clear();
          if (nextIndex !== -1) {
            selectedGroupIds.add(groupIds[nextIndex]);
          }

          selectedPartyId = null;
          renderGroupDropdown();
          renderChart();
          scrollAccumulator = 0;
        }
      }, { passive: false });
    }

    function toggleGroupMenu() {
      const menu = document.getElementById('groupMenu');
      menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
    }

    document.addEventListener('mousedown', (e) => {
      const gDropdown = document.getElementById('groupDropdown');
      const gMenu = document.getElementById('groupMenu');
      if (gDropdown && gMenu && !gDropdown.contains(e.target) && !gMenu.contains(e.target)) {
        gMenu.style.display = 'none';
      }
      const cDropdown = document.getElementById('compareDropdown');
      const cMenu = document.getElementById('compareMenu');
      if (cDropdown && cMenu && !cDropdown.contains(e.target) && !cMenu.contains(e.target)) {
        cMenu.style.display = 'none';
      }
      const ctDropdown = document.getElementById('countryDropdown');
      const ctMenu = document.getElementById('countryMenu');
      if (ctDropdown && ctMenu && !ctDropdown.contains(e.target) && !ctMenu.contains(e.target)) {
        ctMenu.style.display = 'none';
      }
    });

    function toggleCountryMenu() {
      const menu = document.getElementById('countryMenu');
      menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
    }

    function toggleCompareMenu() {
      const menu = document.getElementById('compareMenu');
      menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
    }

    function renderCountryDropdown() {
      const menu = document.getElementById("countryMenu");
      menu.innerHTML = "";

      const codesInData = [...new Set(allData.map((d) => d.country))].filter(Boolean);
      const countryOptions = codesInData.map(code => ({ code: countryMapping[code], id: code })).filter(c => c.code !== undefined).sort((a, b) => a.code.localeCompare(b.code));

      // Clear All option
      const allItem = document.createElement("div");
      allItem.className = "dropdown-item clear-all";
      allItem.innerHTML = `<span>Clear All</span>`;
      allItem.onclick = (e) => {
        e.stopPropagation();
        selectedCountries.clear();
        selectedPartyId = null;
        renderCountryDropdown();
        renderChart();
      };
      menu.appendChild(allItem);

      countryOptions.forEach(c => {
        const isSelected = selectedCountries.has(c.code);
        const item = document.createElement("div");
        item.className = `dropdown-item ${isSelected ? 'active' : ''}`;
        item.style.justifyContent = "center";
        item.innerHTML = `<span style="font-size: 13px;">${getFlagEmoji(c.code)} ${c.code}</span>`;
        item.onclick = (e) => {
          e.stopPropagation();
          if (isSelected) selectedCountries.delete(c.code);
          else selectedCountries.add(c.code);
          selectedPartyId = null;
          renderCountryDropdown();
          renderChart();
        };
        menu.appendChild(item);
      });

      const textSpan = document.getElementById("countryDropdownText");
      if (selectedCountries.size === 0) textSpan.innerText = "All Countries";
      else if (selectedCountries.size === 1) textSpan.innerText = `${getFlagEmoji([...selectedCountries][0])} ${[...selectedCountries][0]}`;
      else textSpan.innerText = `${selectedCountries.size} Countries`;
    }

    function enableCountryWheelSelection() {
      const el = document.getElementById("countryDropdown");
      let scrollAccumulator = 0;
      const THRESHOLD = 60;

      el.addEventListener("wheel", function (e) {
        if (selectedCountries.size > 1) return;
        e.preventDefault();
        scrollAccumulator += e.deltaY;
        if (Math.abs(scrollAccumulator) >= THRESHOLD) {
          const direction = scrollAccumulator > 0 ? 1 : -1;
          const codesInData = [...new Set(allData.map((d) => d.country))].filter(Boolean);
          const codes = codesInData.map(code => countryMapping[code]).filter(Boolean).sort((a, b) => a.localeCompare(b));

          let currentIndex = -1;
          if (selectedCountries.size === 1) {
            currentIndex = codes.indexOf([...selectedCountries][0]);
          }

          let nextIndex = currentIndex + direction;
          if (nextIndex < -1) nextIndex = codes.length - 1;
          else if (nextIndex >= codes.length) nextIndex = -1;

          selectedCountries.clear();
          if (nextIndex !== -1) selectedCountries.add(codes[nextIndex]);

          selectedPartyId = null;
          renderCountryDropdown();
          renderChart();
          scrollAccumulator = 0;
        }
      }, { passive: false });
    }

    function renderCompareDropdown() {
      const menu = document.getElementById("compareMenu");
      const years = [...new Set(allData.map((d) => d.year))].sort((a, b) => b - a);
      const currentYear = parseInt(document.getElementById("yearSelect").value);
      menu.innerHTML = "";

      // Clear All option
      const noneItem = document.createElement("div");
      noneItem.className = "dropdown-item clear-all";
      noneItem.innerHTML = `<span>Clear All</span>`;
      noneItem.onclick = (e) => {
        e.stopPropagation();
        selectedCompareYears.clear();
        renderCompareDropdown();
        renderChart();
      };
      menu.appendChild(noneItem);

      years.forEach(y => {
        const isSelected = selectedCompareYears.has(y);
        const item = document.createElement("div");
        item.className = `dropdown-item ${isSelected ? 'active' : ''}`;
        const label = y === currentYear ? `${y} (Current)` : y;
        item.innerHTML = `<span>${label}</span>`;
        item.onclick = (e) => {
          e.stopPropagation();
          if (isSelected) selectedCompareYears.delete(y);
          else selectedCompareYears.add(y);
          renderCompareDropdown();
          renderChart();
        };
        menu.appendChild(item);
      });

      const textSpan = document.getElementById("compareDropdownText");
      if (selectedCompareYears.size === 0) textSpan.innerText = "None";
      else if (selectedCompareYears.size === 1) textSpan.innerText = Array.from(selectedCompareYears)[0];
      else textSpan.innerText = `${selectedCompareYears.size} Selected`;
    }

    function enableCompareWheelSelection() {
      const el = document.getElementById("compareDropdown");
      let scrollAccumulator = 0;
      const THRESHOLD = 60;

      el.addEventListener("wheel", function (e) {
        if (selectedCompareYears.size > 1) return;
        e.preventDefault();
        scrollAccumulator += e.deltaY;
        if (Math.abs(scrollAccumulator) >= THRESHOLD) {
          const direction = scrollAccumulator > 0 ? 1 : -1;
          const years = [...new Set(allData.map((d) => d.year))].sort((a, b) => b - a);
          const currentYear = parseInt(document.getElementById("yearSelect").value);
          const validYears = years.filter(y => y !== currentYear);

          let currentIndex = -1;
          if (selectedCompareYears.size === 1) {
            currentIndex = validYears.indexOf(Array.from(selectedCompareYears)[0]);
          }

          let nextIndex = currentIndex + direction;
          if (nextIndex < -1) nextIndex = validYears.length - 1;
          else if (nextIndex >= validYears.length) nextIndex = -1;

          selectedCompareYears.clear();
          if (nextIndex !== -1) selectedCompareYears.add(validYears[nextIndex]);

          renderCompareDropdown();
          renderChart();
          scrollAccumulator = 0;
        }
      }, { passive: false });
    }

    function renderGroupDropdown() {
      const menu = document.getElementById("groupMenu");
      menu.innerHTML = "";

      // Clear All option
      const noneItem = document.createElement("div");
      noneItem.className = "dropdown-item clear-all";
      noneItem.innerHTML = `<span>Clear All</span>`;
      noneItem.onclick = (e) => {
        e.stopPropagation();
        selectedGroupIds.clear();
        selectedPartyId = null;
        renderGroupDropdown();
        renderChart();
      };
      menu.appendChild(noneItem);

      let selectedNames = [];
      let selectedColor = null;

      Object.keys(groupMapping).forEach(id => {
        const group = groupMapping[id];
        const isSelected = selectedGroupIds.has(parseInt(id));
        if (isSelected) {
          selectedNames.push(group.name); // Use full name for display
          selectedColor = group.color;
        }

        const item = document.createElement("div");
        item.className = `dropdown-item ${isSelected ? 'active' : ''}`;
        item.innerHTML = `
          <div class="dot" style="background:${group.color};"></div>
          <span>${group.name}</span>
        `;
        item.onclick = (e) => {
          e.stopPropagation(); // Prevent document click handler from closing the menu
          const numId = parseInt(id);
          if (selectedGroupIds.has(numId)) selectedGroupIds.delete(numId);
          else selectedGroupIds.add(numId);
          selectedPartyId = null;
          renderGroupDropdown();
          renderChart();
        };
        menu.appendChild(item);
      });

      const textSpan = document.getElementById("groupDropdownText");
      const dropdown = document.getElementById("groupDropdown");
      const existingDot = dropdown.querySelector(".dot");
      if (existingDot) existingDot.remove();

      if (selectedGroupIds.size === 0) {
        textSpan.innerText = "All Groups";
      } else if (selectedGroupIds.size === 1) {
        textSpan.innerText = selectedNames[0];
        const dot = document.createElement("div");
        dot.className = "dot";
        dot.style.background = selectedColor;
        dot.style.marginRight = "8px";
        dropdown.insertBefore(dot, textSpan);
      } else {
        textSpan.innerText = `${selectedGroupIds.size} Selected`;
      }
    }

    function renderChart() {
      const selectedYear = parseInt(document.getElementById("yearSelect").value);
      const sortedCompYears = Array.from(selectedCompareYears).sort((a, b) => a - b);
      const allTargetYears = [selectedYear, ...sortedCompYears];

      // Get all unique party IDs present in any of the targeted years for the selected country
      const relevantData = allData.filter(d =>
        allTargetYears.includes(d.year) &&
        (selectedCountries.size === 0 || selectedCountries.has(countryMapping[d.country]))
      );
      const allPartyIds = [...new Set(relevantData.map(d => d.party_id))];

      const datasets = [];
      const interactionRadius = 20;

      allPartyIds.forEach(pid => {
        const pData = relevantData.filter(d => d.party_id === pid);
        const modern = pData.find(d => d.year === selectedYear);

        // Use the most recent data available for general info
        const latest = pData.sort((a, b) => b.year - a.year)[0];

        // Visibility check
        let isVisible = true;
        if (selectedPartyId !== null) {
          isVisible = (pid === selectedPartyId);
        } else if (selectedGroupIds.size > 0) {
          isVisible = selectedGroupIds.has(modern ? modern.family : latest.family);
        }
        if (!isVisible) return;

        const historyList = [];
        sortedCompYears.forEach(year => {
          if (year === selectedYear) return;
          const h = pData.find(d => d.year === year);
          if (h) historyList.push(h);
        });

        if (modern) {
          // Draw all history points as hollow
          historyList.forEach(h => {
            const hRadius = Math.sqrt(h.vote || 2) * 4;
            datasets.push({
              label: `${h.party} (${h.year})`,
              backgroundColor: 'transparent',
              borderColor: groupMapping[h.family]?.color || "#888",
              borderWidth: 1.5,
              data: [{ x: h.lrecon, y: h.galtan, r: hRadius }],
              _partyData: h, _isHistory: true, order: 2,
              hitRadius: interactionRadius, hoverRadius: 0
            });
          });
          // Draw modern as solid
          const bRadius = Math.sqrt(modern.vote || 2) * 4;
          datasets.push({
            label: modern.party,
            backgroundColor: (groupMapping[modern.family]?.color || "#808080") + "AA",
            borderColor: groupMapping[modern.family]?.color || "#888",
            data: [{ x: modern.lrecon, y: modern.galtan, r: bRadius }],
            _partyData: modern,
            _historyList: historyList.map(h => ({ year: h.year, x: h.lrecon, y: h.galtan, vote: h.vote, family: h.family })),
            order: 1,
            hitRadius: interactionRadius, hoverRadius: 0
          });
        } else if (historyList.length > 0) {
          // Extinct party: Draw all but last history point as hollow
          const lastH = historyList[historyList.length - 1];
          const others = historyList.slice(0, -1);
          others.forEach(h => {
            datasets.push({
              label: `${h.party} (${h.year})`,
              backgroundColor: 'transparent',
              borderColor: groupMapping[h.family]?.color || "#888",
              borderWidth: 1.5,
              data: [{ x: h.lrecon, y: h.galtan, r: Math.sqrt(h.vote || 2) * 4 }],
              _partyData: h, _isHistory: true, order: 2,
              hitRadius: interactionRadius, hoverRadius: 0
            });
          });
          // Promote last history point to "primary" to carry trajectory
          const hRadius = Math.sqrt(lastH.vote || 2) * 4;
          datasets.push({
            label: `${lastH.party} (${lastH.year})`,
            backgroundColor: 'transparent',
            borderColor: groupMapping[lastH.family]?.color || "#888",
            borderWidth: 1.5,
            data: [{ x: lastH.lrecon, y: lastH.galtan, r: hRadius }],
            _partyData: lastH,
            _historyList: others.map(h => ({ year: h.year, x: h.lrecon, y: h.galtan, vote: h.vote, family: h.family })),
            order: 1,
            hitRadius: interactionRadius, hoverRadius: 0
          });
        }
      });

      if (myChart) {
        myChart.data.datasets = datasets;
        const style = getComputedStyle(document.body);
        const gridCol = style.getPropertyValue('--border-main');

        myChart.options.scales.x.grid.color = (c) => c.tick && c.tick.value === 5 ? 'transparent' : gridCol;
        myChart.options.scales.x.grid.borderColor = gridCol;
        myChart.options.scales.x.grid.tickColor = (c) => c.tick && c.tick.value === 5 ? 'transparent' : gridCol;
        myChart.options.scales.x.ticks.color = style.getPropertyValue('--text-muted');

        myChart.options.scales.y.grid.color = (c) => c.tick && c.tick.value === 5 ? 'transparent' : gridCol;
        myChart.options.scales.y.grid.borderColor = gridCol;
        myChart.options.scales.y.grid.tickColor = (c) => c.tick && c.tick.value === 5 ? 'transparent' : gridCol;
        myChart.options.scales.y.ticks.color = style.getPropertyValue('--text-muted');

        myChart.options.interaction.intersect = true;
        myChart.update();
      } else {
        myChart = new Chart(document.getElementById("compassChart").getContext("2d"), {
          type: "bubble",
          data: { datasets },
          plugins: [centralAxisPlugin, evolutionPlugin, cornerLabelsPlugin, regressionPlugin],
          options: {
            interaction: {
              mode: 'nearest',
              intersect: true,
              axis: 'xy'
            },
            animation: false, maintainAspectRatio: false, clip: false, layout: { autoPadding: false, padding: { top: 38, right: 38, bottom: 38, left: 38 } },
            onHover: (e, el) => {
              const visible = el.length > 0;
              e.native.target.style.cursor = visible ? "pointer" : "default";
            },
            onClick: (event, elements, chart) => {
              const isTouch = (('ontouchstart' in window) || (navigator.maxTouchPoints > 0));
              if (isTouch) return;

              if (elements.length === 0) {
                selectedPartyId = null;
              } else {
                const ds = chart.data.datasets[elements[0].datasetIndex];
                selectedPartyId = (selectedPartyId === ds._partyData.party_id) ? null : ds._partyData.party_id;
              }
              renderChart();
              renderGroupDropdown();
            },
            scales: {
              x: {
                min: 0, max: 10, title: { display: false },
                grid: {
                  color: getComputedStyle(document.body).getPropertyValue('--border-main'),
                  borderColor: getComputedStyle(document.body).getPropertyValue('--border-main'),
                  tickColor: getComputedStyle(document.body).getPropertyValue('--border-main')
                },
                ticks: { color: getComputedStyle(document.body).getPropertyValue('--text-muted') },
                afterFit: (axis) => { axis.height = 30; } // Lock X-axis height
              },
              y: {
                min: 0, max: 10, title: { display: false },
                grid: {
                  color: getComputedStyle(document.body).getPropertyValue('--border-main'),
                  borderColor: getComputedStyle(document.body).getPropertyValue('--border-main'),
                  tickColor: getComputedStyle(document.body).getPropertyValue('--border-main')
                },
                ticks: { color: getComputedStyle(document.body).getPropertyValue('--text-muted'), padding: 8 },
                afterFit: (axis) => { axis.width = 45; } // Lock Y-axis width
              },
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                enabled: true,
                callbacks: {
                  label: (ctx) => {
                    const d = ctx.dataset._partyData;
                    const countryCode = countryMapping[d.country] || "";
                    const flag = countryCode ? getFlagEmoji(countryCode) : "";
                    const groupName = groupMapping[d.family]?.name || "Unknown Group";
                    return [
                      `${flag} ${d.party} (${d.year})`,
                      `Group: ${groupName}`,
                      `Vote: ${d.vote}%`,
                      `Econ: ${Math.round(d.lrecon * 10) / 10}, Social: ${Math.round(d.galtan * 10) / 10}`
                    ];
                  }
                }
              }
            }
          }
        });
      }
      updateURL();
    }

    let scrollAccumulator = 0;
    function enableWheelSelection(selectId) {
      const el = document.getElementById(selectId);
      const THRESHOLD = 100;

      el.addEventListener("wheel", function (e) {
        const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
        if (isTouch) return;

        e.preventDefault();
        scrollAccumulator += e.deltaY;

        if (Math.abs(scrollAccumulator) >= THRESHOLD) {
          if (scrollAccumulator > 0) {
            if (this.selectedIndex < this.options.length - 1) {
              this.selectedIndex++;
              this.dispatchEvent(new Event("change"));
            }
          } else {
            if (this.selectedIndex > 0) {
              this.selectedIndex--;
              this.dispatchEvent(new Event("change"));
            }
          }
          scrollAccumulator = 0;
        }
      },
        { passive: false },
      );
    }
  </script>
</body>

</html>
